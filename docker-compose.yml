services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-23ai
    restart: always
    ports:
      - "${ORACLE_PORT}:1521"
      - "${APEX_PORT}:8443"
    environment:
      - ORACLE_PWD=${ORACLE_PWD}
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./data:/opt/oracle/data_in
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  oracle_data:
    driver: local
