volumes:
  oracle_data_26ai:
  ollama_data_26ai:

services:
  oracle-26ai:
    image: gvenzl/oracle-free:latest
    container_name: oracle-26ai
    hostname: oracle-26ai
    privileged: true
    shm_size: 2g
    restart: unless-stopped
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PWD}
      - APP_USER=${DB_USER}
      - APP_USER_PASSWORD=${DB_PASS}
      - ORACLE_DATABASE=${DB_SID}
    cap_add:
      - SYS_RESOURCE
      - IPC_LOCK
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - oracle_data_26ai:/opt/oracle/oradata
      - ./sql/dumps:/opt/oracle/admin/FREE/dpdump
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  ollama-26ai:
    image: ollama/ollama:latest
    container_name: ollama-26ai
    volumes:
      - ollama_data_26ai:/root/.ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
