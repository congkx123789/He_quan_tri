version: '3.8'

services:
  # 1. Oracle Database 23ai (Primary Engine)
  oracle:
    container_name: oracle-23ai
    image: container-registry.oracle.com/database/free:latest
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    environment:
      - ORACLE_PWD=${ORACLE_PWD:-OracleAdmin123!}
    volumes:
      - ./data:/opt/oracle/data_in
      - ./sql:/opt/oracle/scripts/setup
    restart: always

  # 2. Ollama (AI Brain)
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always

  # 3. Data Engineering Engine (Dual-Mode Portability B)
  data-engine:
    container_name: data-engine
    build:
      context: .
      dockerfile: Dockerfile.engine
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_ENABLE_HF_TRANSFER=1
    volumes:
      - ./data:/app/data
    profiles:
      - setup-mode # Only runs when explicitly requested via --profile

networks:
  default:
    name: oracle-network
